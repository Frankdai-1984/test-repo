name: 跑圈热点监控

on:
  schedule:
    # 每日早8点运行（北京时间）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  hot-topics-monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装依赖
      run: |
        pip install requests beautifulsoup4 feedparser
    
    - name: 运行热点监控脚本
      env:
        WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
        ZHIHU_TOKEN: ${{ secrets.ZHIHU_TOKEN }}
        DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
        XIAOHONGSHU_COOKIE: ${{ secrets.XIAOHONGSHU_COOKIE }}
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: |
        python scripts/hot_topics_monitor.py
        ls -la hot-topics/ || echo "目录不存在"
        cat hot-topics/*.md 2>/dev/null || echo "没有 markdown 文件"
    
    - name: 提交更新
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update hot topics - $(date +%Y-%m-%d)"
        file_pattern: 'hot-topics/*'
        commit_author: 'GitHub Action <action@github.com>'
        commit_user_name: 'GitHub Action'
        commit_user_email: 'action@github.com'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}